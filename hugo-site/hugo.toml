baseURL = "https://wenboli-cn-de.github.io/"
languageCode = "zh-CN"
title = "高傲的电工李"
theme = "custom-theme"
paginate = 20
paginatePath = "page"

[author]
  name = "李文博"
  email = "lwb_010@163.com"

[params]
  subtitle = "个人博客"
  description = "欢迎来到我的个人博客"
  author = "李文博"
  avatarTitle = "李文博"
  avatarDesc = "机电 / 机器学习"
  enableToc = true

[params.social]
  github = "WenboLi-CN-DE"
  email = "lwb_010@163.com"

[params.blog_button]
  title = "博客主页"

[menu]
  [[menu.main]]
    name = "所有文章"
    url = "/posts/"
    weight = 1
  [[menu.main]]
    name = "标签"
    url = "/tags/"
    weight = 2
  [[menu.main]]
    name = "关于我"
    url = "/about/"
    weight = 3

[permalinks]
  posts = "/:year/:month/:title/"

[outputs]
  home = ["HTML"]
  section = ["HTML"]
  taxonomy = ["HTML"]
  term = ["HTML"]

[markup]
  [markup.highlight]
    style = "monokai"
    lineNos = false
    lineNumbersInTable = false
    noClasses = true
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[taxonomies]
  category = "categories"
  tag = "tags"

[params.categories]
  [params.categories.life]
    name = "人间便签"
    icon = "📝"
    color = "#e74c3c"
    description = "生活的点滴记录"
  
  [params.categories.thought]
    name = "思维漫游"
    icon = "💭"
    color = "#9b59b6"
    description = "思想的自由探索"
  
  [params.categories.engineering]
    name = "工程随笔"
    icon = "⚙️"
    color = "#3498db"
    description = "工程实践与思考"
  
  [params.categories.code]
    name = "代码诗篇"
    icon = "💻"
    color = "#2ecc71"
    description = "代码的艺术与技巧"
  
  [params.categories.ai]
    name = "智识前沿"
    icon = "🤖"
    color = "#f39c12"
    description = "人工智能的探索"
