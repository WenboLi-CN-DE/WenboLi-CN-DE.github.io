<aside class="sidebar">
    <div class="sidebar-inner">
        <!-- Avatar Section -->
        <div class="sidebar-avatar">
            <div class="avatar-wrapper">
                <img src="/images/avatar.jpg" alt="{{ .Site.Params.author }}" class="avatar-img">
            </div>
            <h3 class="sidebar-name">高傲的电工李</h3>
            <p class="sidebar-title">算法工程师</p>
            <div class="sidebar-contact">
                <span class="contact-location">Beijing</span>
            </div>
        </div>
        
        <!-- About Section -->
        <div class="sidebar-section">
            <h4 class="sidebar-heading">关于我</h4>
            <p class="sidebar-text">{{ .Site.Params.description }}</p>
        </div>
        
        <!-- Categories Section -->
        <div class="sidebar-section">
            <h4 class="sidebar-heading">分类</h4>
            <div class="category-list">
                {{ range $key, $value := .Site.Params.categories }}
                <a href="/categories/{{ $key }}" class="category-item" style="--category-color: {{ $value.color }}">
                    <span class="category-name">{{ $value.name }}</span>
                </a>
                {{ end }}
            </div>
        </div>
        
        <!-- Social Links -->
        <div class="sidebar-section">
            <h4 class="sidebar-heading">社交链接</h4>
            <div class="social-links">
                {{ with .Site.Params.social.github }}
                <a href="https://github.com/{{ . }}" target="_blank" rel="noopener" class="social-link" title="GitHub">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                        <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
                    </svg>
                </a>
                {{ end }}
                {{ with .Site.Params.social.email }}
                <a href="mailto:{{ . }}" class="social-link" title="Email">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                        <path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/>
                    </svg>
                </a>
                {{ end }}
            </div>
        </div>
    </div>
</aside>
