<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ block "title" . }}{{ .Site.Title }}{{ end }}</title>
    <meta name="description" content="{{ .Site.Params.description }}">
    
    <style>
        {{ readFile "themes/custom-theme/static/css/critical.css" | safeCSS }}
    </style>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@300;400;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+SC:wght@400;500;700&family=Noto+Serif+SC:wght@400;600;700&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@300;400;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+SC:wght@400;500;700&family=Noto+Serif+SC:wght@400;600;700&display=swap"></noscript>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" integrity="sha384-n8MVd4RsNIU0tAv4ct0nTaAbDJwPJzDEaqSD1odI+WdtXRGWt2kTvGFasHpSy3SV" crossorigin="anonymous">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js" integrity="sha384-XjKyOOlGwcjNTAIQHIpgOno0Hl1YQqzUOEleOLALmuqehneUG+vnGctmUb0ZY0l8" crossorigin="anonymous"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js" integrity="sha384-+VBxd3r6XgURycqtZ117nYw44OOcIax56Z4dCRWbxyPt0Koah1uHoK0o4+/RRE05" crossorigin="anonymous"></script>
    
    <link rel="stylesheet" href="{{ "css/variables.css" | relURL }}">
    <link rel="stylesheet" href="{{ "css/header.css" | relURL }}">
    <link rel="stylesheet" href="{{ "css/home.css" | relURL }}">
    <link rel="stylesheet" href="{{ "css/sidebar.css" | relURL }}">
    <link rel="stylesheet" href="{{ "css/post.css" | relURL }}">
    <link rel="stylesheet" href="{{ "css/article-card.css" | relURL }}">
    <link rel="stylesheet" href="{{ "css/taxonomy.css" | relURL }}">
    <link rel="stylesheet" href="{{ "css/main.css" | relURL }}">
    <link rel="stylesheet" href="{{ "css/animate.css" | relURL }}">
    <link rel="stylesheet" href="{{ "css/tomorrow.css" | relURL }}">
    
    <script src="{{ "js/theme-switcher.js" | relURL }}"></script>
    
    {{ block "head" . }}{{ end }}
</head>
<body>
    <a href="#main-content" class="skip-to-content">跳转到主内容</a>
    <button id="theme-toggle" class="theme-toggle" aria-label="切换主题">🌙</button>
    
    {{ partial "header.html" . }}
    
    <main>
        {{ block "main" . }}{{ end }}
    </main>
    
    {{ partial "footer.html" . }}
    
    <script src="{{ "js/sidebar.js" | relURL }}"></script>
    <script src="{{ "js/lazy-load.js" | relURL }}"></script>
    <script src="{{ "js/highlight.pack.js" | relURL }}"></script>
    <script src="{{ "js/main.js" | relURL }}"></script>
    <script src="{{ "js/theme-toggle.js" | relURL }}"></script>
    
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            renderMathInElement(document.body, {
                delimiters: [
                    {left: "$$", right: "$$", display: true},
                    {left: "$", right: "$", display: false},
                    {left: "\\[", right: "\\]", display: true},
                    {left: "\\(", right: "\\)", display: false}
                ],
                throwOnError: false
            });
        });
    </script>
    
    {{ block "scripts" . }}{{ end }}
</body>
</html>
