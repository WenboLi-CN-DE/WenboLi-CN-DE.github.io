{{ define "title" }}{{ .Title }} - {{ .Site.Title }}{{ end }}

{{ define "main" }}
<div class="post-list">
    <h1>{{ .Title }}</h1>
    
    {{ range .Pages }}
    <article class="post-preview">
        <h2><a href="{{ .Permalink }}">{{ .Title }}</a></h2>
        <div class="post-meta">
            <time datetime="{{ .Date.Format "2006-01-02" }}">
                {{ .Date.Format "2006年01月02日" }}
            </time>
        </div>
        {{ with .Description }}
        <p class="post-description">{{ . }}</p>
        {{ end }}
    </article>
    {{ end }}
</div>
{{ end }}
